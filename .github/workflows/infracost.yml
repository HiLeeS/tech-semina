name: "Infracost - PR Cost Estimation"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: "Cost Estimation"
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. 체크아웃
      # --------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Infracost 설치 및 인증
      # --------------------------------------------------
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # --------------------------------------------------
      # 3. AWS 자격증명 (GitHub Secrets 사용)
      # --------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

# --------------------------------------------------
      # 4. 팀별 비용 분석 및 합산
      # --------------------------------------------------
      - name: Generate Infracost Breakdown
        run: |
          infracost breakdown \
            --path=terraform \
            --terraform-var-file=auth.tfvars \
            --project-name="auth-team" \
            --format=json \
            --out-file=/tmp/infracost-auth.json

          infracost breakdown \
            --path=terraform \
            --terraform-var-file=loan.tfvars \
            --project-name="loan-team" \
            --format=json \
            --out-file=/tmp/infracost-loan.json

          infracost breakdown \
            --path=terraform \
            --terraform-var-file=payment.tfvars \
            --project-name="payment-team" \
            --format=json \
            --out-file=/tmp/infracost-payment.json

          infracost output \
            --path=/tmp/infracost-auth.json \
            --path=/tmp/infracost-loan.json \
            --path=/tmp/infracost-payment.json \
            --format=json \
            --out-file=/tmp/infracost.json

      # --------------------------------------------------
      # 5. 비용 테이블 확인 (디버그용)
      # --------------------------------------------------
      - name: Show Infracost Output
        run: |
          infracost output \
            --path=/tmp/infracost-auth.json \
            --path=/tmp/infracost-loan.json \
            --path=/tmp/infracost-payment.json \
            --format=table

      # --------------------------------------------------
      # 6. PR에 비용 추정 코멘트 게시
      # --------------------------------------------------
      - name: Post Infracost Comment
        run: |
          infracost comment github \
            --path=/tmp/infracost-auth.json \
            --path=/tmp/infracost-loan.json \
            --path=/tmp/infracost-payment.json \
            --repo=${{ github.repository }} \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update \
            --show-all-projects