name: "Infracost - PR Cost Estimation"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  infracost:
    name: "Cost Estimation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Generate Infracost Breakdown
        run: |
          infracost breakdown \
            --path=terraform \
            --terraform-var-file=terraform/auth.tfvars \
            --format=json \
            --out-file=/tmp/infracost-auth.json

          infracost breakdown \
            --path=terraform \
            --terraform-var-file=terraform/loan.tfvars \
            --format=json \
            --out-file=/tmp/infracost-loan.json

          infracost breakdown \
            --path=terraform \
            --terraform-var-file=terraform/payment.tfvars \
            --format=json \
            --out-file=/tmp/infracost-payment.json

          infracost output \
            --path=/tmp/infracost-auth.json \
            --path=/tmp/infracost-loan.json \
            --path=/tmp/infracost-payment.json \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Post Infracost Comment
        run: |
          infracost comment github \
            --path=/tmp/infracost.json \
            --repo=${{ github.repository }} \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --behavior=update