name: "Terraform CI - Tag Validation"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform

jobs:
  terraform-validate:
    name: "Validate & Plan"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      # --------------------------------------------------
      # 1. 체크아웃
      # --------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Terraform 설치
      # --------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --------------------------------------------------
      # 3. AWS 자격증명 (GitHub Secrets 사용)
      # --------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # --------------------------------------------------
      # 4. Terraform Init
      # --------------------------------------------------
      - name: Terraform Init
        run: terraform init

      # --------------------------------------------------
      # 5. Terraform Format 검사
      # --------------------------------------------------
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # --------------------------------------------------
      # 6. Terraform Validate (태그 validation 포함)
      # --------------------------------------------------
      - name: Terraform Validate
        run: terraform validate

      # --------------------------------------------------
      # 7. Terraform Plan
      # --------------------------------------------------
      - name: Terraform Plan
        id: plan
        run: |
          {
            echo "=== auth-team ==="
            terraform plan -no-color -input=false -var-file="auth.tfvars" 2>&1 && echo "✅ auth-team passed" || echo "❌ auth-team failed"
            echo "=== loan-team ==="
            terraform plan -no-color -input=false -var-file="loan.tfvars" 2>&1 && echo "✅ loan-team passed" || echo "❌ loan-team failed"
            echo "=== payment-team ==="
            terraform plan -no-color -input=false -var-file="payment.tfvars" 2>&1 && echo "✅ payment-team passed" || echo "❌ payment-team failed"
          } 2>&1 | tee /tmp/plan_full.txt

          # 에러 섹션만 추출
          grep -A 10 "Error:" /tmp/plan_full.txt > /tmp/plan_errors.txt || true
          # 팀별 결과 요약
          grep -E "(=== .+ ===|✅|❌)" /tmp/plan_full.txt > /tmp/plan_summary.txt || true

          # 전체 실패 여부 판단
          grep -q "❌" /tmp/plan_summary.txt && exit 1 || exit 0
        continue-on-error: true

      # --------------------------------------------------
      # 8. PR에 Plan 결과 코멘트
      # --------------------------------------------------
      - name: Comment Plan Result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/plan_summary.txt', 'utf8');
            const errors = fs.existsSync('/tmp/plan_errors.txt')
              ? fs.readFileSync('/tmp/plan_errors.txt', 'utf8')
              : '';
            const planOutcome = '${{ steps.plan.outcome }}';
            const icon = planOutcome === 'success' ? '✅' : '❌';

            const body = `## ${icon} Terraform Plan 결과

            **Status:** \`${planOutcome}\`

            ### 팀별 결과
            \`\`\`
            ${summary}
            \`\`\`

            ${errors ? `### ❌ 에러 상세\n\`\`\`\n${errors}\n\`\`\`` : ''}

            > 🏷️ 태그 validation을 통과해야 Plan이 성공합니다.
            > 허용된 태그 값은 \`variables.tf\`를 확인하세요.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # --------------------------------------------------
      # 9. Plan 실패 시 워크플로우 실패 처리
      # --------------------------------------------------
      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
